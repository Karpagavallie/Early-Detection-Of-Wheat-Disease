<!-- frontend/upload.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Leaf Image</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Upload Wheat Leaf Image</h2>
        <form id="uploadForm">
            <input type="file" id="leafImage" accept="image/*" required>
            <textarea id="remarks" placeholder="Enter remarks (optional)"></textarea>
            <button type="submit">Analyze</button>
        </form>

        <img id="preview" class="preview" style="display:none;" alt="Image Preview">
        <p id="message"></p>
    </div>

    <script src="upload.js"></script>
</body>
</html>
